name: Build and Deploy

on:
  push:
    branches:
      - master  # 只在 vue 分支觸發
    paths-ignore:
      - '.github/workflows/**'  # 避免修改 workflow 本身時觸發
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to dist branch
        run: |
          # 保存構建產物到臨時目錄
          mkdir -p /tmp/build
          cp -r assets/ index.html favicon.ico /tmp/build/

          # 切換到 dist 分支（或創建 orphan branch）
          git fetch origin dist 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/dist; then
            git checkout dist
            git rm -rf . 2>/dev/null || true
          else
            git checkout --orphan dist
            git rm -rf . 2>/dev/null || true
          fi

          # 複製構建產物
          cp -r /tmp/build/* .

          # 提交並推送（只添加構建產物，不添加其他檔案）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/ index.html favicon.ico
          git commit -m "build: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin dist

      - name: Return to source branch
        run: git checkout master
