name: Build and Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ "$before" =~ ^0+$ ]]; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$before" "${{ github.sha }}" | grep -q '^frontend/'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.frontend_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.frontend_changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build
        if: steps.changes.outputs.frontend_changed == 'true'
        working-directory: frontend
        run: npm run build

      - name: Deploy to dist branch
        run: |
          mkdir -p /tmp/dist
          rsync -a \
            --exclude=frontend \
            --exclude=node_modules \
            --exclude=.github \
            --exclude=docs \
            --exclude=.claude \
            --exclude=CLAUDE.md \
            --exclude=.python-version \
            --exclude=pyproject.toml \
            --exclude=.venv \
            --exclude='*.py' \
            --exclude=uv.lock \
            --exclude='.git' \
            . /tmp/dist/

          rm -rf /tmp/dist/frontend

          if [ "${{ steps.changes.outputs.frontend_changed }}" = "true" ]; then
            cp -r assets/ index.html favicon.ico /tmp/dist/
          else
            git fetch origin dist
            git archive origin/dist assets index.html favicon.ico | tar -x -C /tmp/dist
          fi

          cat > /tmp/dist/.gitignore << 'EOF'
          # Sensitive config
          api/config/oauth.php

          # Not tracked in deployment
          .vscode/
          frontend/
          node_modules/
          EOF

          git fetch origin dist 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/dist; then
            git checkout dist
          else
            git checkout --orphan dist
          fi
          git rm -rf . --quiet || true
          git clean -fdx

          cp -r /tmp/dist/. .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "build: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin dist
          fi

      - name: Return to source branch
        run: git checkout master

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin dist
