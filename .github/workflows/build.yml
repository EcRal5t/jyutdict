name: Build and Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to dist branch
        run: |
          # 保存構建產物到臨時目錄
          mkdir -p /tmp/build
          cp -r assets/ index.html favicon.ico /tmp/build/

          # 要從 dist 分支刪除的目錄/檔案
          TO_REMOVE="frontend .github docs .claude CLAUDE.md .python-version pyproject.toml .venv *.py uv.lock migrate_pronunciation.py 字表更新日誌.md"

          # 切換到 dist 分支（或創建 orphan branch）
          git fetch origin dist 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/dist; then
            git checkout dist
          else
            git checkout --orphan dist
          fi

          # 刪除不需要的檔案
          for item in $TO_REMOVE; do
            rm -rf "$item" 2>/dev/null || true
          done

          # 複製構建產物
          cp -r /tmp/build/* .

          # 創建簡化的 .gitignore（只保留必要項）
          cat > .gitignore << 'EOF'
          # 敏感配置
          api/config/oauth.php

          # 不需要追蹤
          .vscode/
          EOF

          # 提交並推送
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin dist

      - name: Return to source branch
        run: git checkout master
