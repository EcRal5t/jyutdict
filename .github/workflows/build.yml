name: Build and Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to dist branch
        run: |
          # 從 master 工作目錄（含後端檔案）準備 dist 內容，排除前端源碼等不需要的部分
          mkdir -p /tmp/dist
          rsync -a \
            --exclude=frontend \
            --exclude=node_modules \
            --exclude=.github \
            --exclude=docs \
            --exclude=.claude \
            --exclude=CLAUDE.md \
            --exclude=.python-version \
            --exclude=pyproject.toml \
            --exclude=.venv \
            --exclude='*.py' \
            --exclude=uv.lock \
            --exclude='.git' \
            . /tmp/dist/

          # 確保前端源碼目錄不被帶入
          rm -rf /tmp/dist/frontend

          # 覆蓋構建產物（postbuild 已部署到根目錄）
          cp -r assets/ index.html favicon.ico /tmp/dist/

          # 簡化 .gitignore
          cat > /tmp/dist/.gitignore << 'EOF'
          # 敏感配置
          api/config/oauth.php

          # 不需要追蹤
          .vscode/
          EOF

          # 切換到 dist 分支並清空
          git fetch origin dist 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/dist; then
            git checkout dist
          else
            git checkout --orphan dist
          fi
          git rm -rf . --quiet

          # 複製準備好的內容
          cp -r /tmp/dist/. .

          # 提交並推送
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin dist

      - name: Return to source branch
        run: git checkout master

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin dist