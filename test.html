<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toggle Class Visibility</title>
<style>
  /* 1. 定义一个用于隐藏元素的CSS类 */
  .hidden {
    display: none;
  }

  /* (可选) 给 "marked" 元素一些样式，方便观察 */
  .marked {
    background-color: yellow;
    padding: 2px 4px;
    border-radius: 3px;
    font-weight: bold;
  }
  
  body {
    font-family: sans-serif;
    line-height: 1.6;
  }
  
  button {
    padding: 8px 16px;
    cursor: pointer;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

  <button id="toggleButton">切换 Marked 元素的显示</button>

  <p>这是一个段落，其中包含一些 <span class="marked">被标记的</span> 文本。</p>
  <p>这是另一个段落，这里也有一个 <span class="marked">重要的</span> 部分。</p>
  <div>在 div 里的 <span class="marked">另一个标记</span>。</div>
  <p>这个 span 没有 "marked" 类，所以<span style="color: blue;">不会受到</span>影响。</p>


  <script>
    // 3. 编写 JavaScript 逻辑
    
    // 获取按钮元素
    const toggleButton = document.getElementById('toggleButton');
    
    // 获取所有带有 "marked" 类的 span 元素
    // 注意：这里用 querySelectorAll 来选中所有匹配的元素
    const markedSpans = document.querySelectorAll('span.marked');

    // 为按钮添加点击事件监听器
    toggleButton.addEventListener('click', function() {
      // 遍历所有找到的 markedSpans 元素
      markedSpans.forEach(span => {
        // 对每个元素，切换 'hidden' 类的存在状态
        // 如果 'hidden' 类存在，就移除它；如果不存在，就添加它。
        span.classList.toggle('hidden');
      });
    });
  </script>

</body>
</html>
